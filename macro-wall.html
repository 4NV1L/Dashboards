<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Macro Wall</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif; color: #e8edf2; }
  #grid { height: 100dvh; display: grid; grid-auto-rows: 1fr; gap: 8px; padding: 8px; box-sizing: border-box; }
  .panel { background: #0e1218; border-radius: 10px; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 10px 14px; }
  .hdr { flex: 0 0 auto; display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
  .hdr .t { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: #7a8694; }
  .hdr .s { font-size: 11px; color: #5b6672; }
  .frame { flex: 1 1 auto; min-height: 0; border-radius: 8px; overflow: hidden; background: #000; }
  /* invert() flips a light chart dark; hue-rotate() keeps line colors roughly true */
  iframe { width: 100%; height: 100%; border: 0; display: block; background: #fff; filter: invert(1) hue-rotate(180deg); }
  iframe.noinvert { filter: none; background: transparent; }
</style>
</head>
<body>
<div id="grid"></div>

<script>
  // ====== EDIT HERE ======
  // Add / remove panels freely. Each is one line.
  //   title  : label shown top-left
  //   sub    : optional small caption
  //   url    : the chart to embed (bgeometrics bare-graphic pattern: /graphics/<name>.html)
  //   invert : leave out (defaults true) to dark-mode a light chart; set false if a chart is already dark
  const COLUMNS = 2;
  const PANELS = [
    { title: "Global Liquidity (M2) vs Bitcoin", sub: "21 central banks · 10-week lead",
      url: "https://charts.bgeometrics.com/graphics/m2_global_10w.html" },
    { title: "MVRV Z-Score", sub: "tops & bottoms",
      url: "https://charts.bgeometrics.com/graphics/mvrv.html" },
    { title: "Pi Cycle Top", sub: "cycle-top signal",
      url: "https://charts.bgeometrics.com/graphics/pi_cycle.html" },
    { title: "Puell Multiple", sub: "miner revenue cycle",
      url: "https://charts.bgeometrics.com/graphics/puell_multiple.html" },
  ];
  // Other bgeometrics graphics you can drop in (same /graphics/ pattern):
  //   nupl, sopr, power_law, terminal_price, hashrate, hashprice, hashribbons,
  //   etf, etf_btc, stablecoin_supply, fear_greed, funding_rate, open_interest_futures,
  //   m2_global, m2_btc, fedfunds, mvrv_ratio
  // Panels aren't limited to bgeometrics — any embeddable chart URL works here too.
  // =======================

  const grid = document.getElementById("grid");
  grid.style.gridTemplateColumns = "repeat(" + COLUMNS + ", 1fr)";
  PANELS.forEach(function(p){
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.innerHTML =
      '<div class="hdr"><span class="t">' + p.title + '</span>' +
      (p.sub ? '<span class="s">' + p.sub + '</span>' : '') + '</div>' +
      '<div class="frame"><iframe src="' + p.url + '" loading="eager" referrerpolicy="no-referrer"' +
      (p.invert === false ? ' class="noinvert"' : '') + '></iframe></div>';
    grid.appendChild(panel);
  });

  // Keep the embedded charts fresh on the wall
  setTimeout(function(){ location.reload(); }, 30 * 60 * 1000);
</script>
</body>
</html>
