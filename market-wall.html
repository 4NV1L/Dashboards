<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Market Wall</title>
  <style>
    html { height: 100%; }
    body { margin: 0; height: 100dvh; min-height: 100%; background: #000;
           overflow: hidden; display: flex; flex-direction: column; }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 8px;
      padding: 8px;
      flex: 1 1 auto;
      min-height: 0;
      box-sizing: border-box;
    }

    .col { display: grid; gap: 8px; min-height: 0; }
    .left  { grid-template-rows: 1fr 1fr; }
    .right { grid-template-rows: 1.5fr 1fr; }

    .panel { position: relative; border-radius: 10px; overflow: hidden; min-height: 0; }
    .tradingview-widget-container,
    .tradingview-widget-container__widget { height: 100%; width: 100%; }

    /* Ticker strip, flush to the bottom — built in directly (no iframe, no extra file) */
    .banner { flex: 0 0 46px; min-height: 46px; border-top: 1px solid #1c2530; background: #0e1218; }
  </style>
</head>
<body>
  <div class="grid">

    <!-- LEFT COLUMN -->
    <div class="col left">

      <!-- CRYPTO HEATMAP -->
      <div class="panel">
        <div class="tradingview-widget-container">
          <div class="tradingview-widget-container__widget"></div>
          <script type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
          {
            "dataSource": "Crypto", "blockSize": "market_cap_calc", "blockColor": "change",
            "locale": "en", "symbolUrl": "", "colorTheme": "dark", "hasTopBar": false,
            "isDataSetEnabled": false, "isZoomEnabled": true, "hasSymbolTooltip": true,
            "isMonoSize": false, "width": "100%", "height": "100%"
          }
          </script>
        </div>
      </div>

      <!-- TECH STOCK HEATMAP -->
      <div class="panel">
        <div class="tradingview-widget-container">
          <div class="tradingview-widget-container__widget"></div>
          <script type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
          {
            "dataSource": "NASDAQ100", "blockSize": "market_cap_basic", "blockColor": "change",
            "grouping": "sector", "locale": "en", "symbolUrl": "", "colorTheme": "dark",
            "hasTopBar": false, "isDataSetEnabled": false, "isZoomEnabled": true,
            "hasSymbolTooltip": true, "isMonoSize": false, "width": "100%", "height": "100%"
          }
          </script>
        </div>
      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="col right">

      <!-- TOP STORIES -->
      <div class="panel">
        <div class="tradingview-widget-container">
          <div class="tradingview-widget-container__widget"></div>
          <script type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
          {
            "feedMode": "all_symbols", "isTransparent": false, "displayMode": "regular",
            "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "en"
          }
          </script>
        </div>
      </div>

      <!-- S&P 500 TREND -->
      <div class="panel">
        <div class="tradingview-widget-container">
          <div class="tradingview-widget-container__widget"></div>
          <script type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
          {
            "symbols": [["S&P 500", "FOREXCOM:SPXUSD|12M"]], "chartOnly": false,
            "width": "100%", "height": "100%", "locale": "en", "colorTheme": "dark",
            "autosize": true, "showVolume": false, "hideDateRanges": false,
            "scalePosition": "right", "scaleMode": "Normal",
            "fontFamily": "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
            "noTimeScale": false, "valuesTracking": "1", "changeMode": "price-and-percent",
            "chartType": "area", "dateRanges": ["1m|30", "3m|60", "12m|1D", "all|1M"]
          }
          </script>
        </div>
      </div>

    </div>

  </div>

  <!-- BOTTOM TICKER (inlined directly — no iframe, no separate file) -->
  <div class="banner">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
      {
        "symbols": [
          { "proName": "COINBASE:BTCUSD", "title": "Bitcoin" },
          { "proName": "COINBASE:SUIUSD", "title": "SUI" },
          { "proName": "COINBASE:SOLUSD", "title": "Solana" },
          { "proName": "COINBASE:2ZUSD",  "title": "DoubleZero" },
          { "proName": "COINBASE:ETHUSD", "title": "Ethereum" },
          { "proName": "NASDAQ:COIN",     "title": "Coinbase" },
          { "proName": "NASDAQ:PYPL",     "title": "PayPal" },
          { "proName": "NASDAQ:TSLA",     "title": "Tesla" },
          { "proName": "NYSE:XYZ",        "title": "Block" },
          { "proName": "NASDAQ:NVDA",     "title": "Nvidia" },
          { "proName": "COINBASE:XRPUSD", "title": "XRP" },
          { "proName": "NASDAQ:PLTR",     "title": "Palantir" },
          { "proName": "NYSE:QBTS",       "title": "D-Wave (QBTS)" },
          { "proName": "NASDAQ:QUBT",     "title": "Quantum Computing (QUBT)" },
          { "proName": "NYSE:GME",        "title": "GameStop" },
          { "proName": "NASDAQ:IBIT",     "title": "iShares Bitcoin (IBIT)" },
          { "proName": "NASDAQ:MSTR",     "title": "Strategy (MSTR)" },
          { "proName": "NYSE:XXI",        "title": "Twenty One (XXI)" }
        ],
        "showSymbolLogo": true, "isTransparent": false,
        "displayMode": "adaptive", "colorTheme": "dark", "locale": "en"
      }
      </script>
    </div>
  </div>

  <!-- Full page reload every 10 minutes -->
  <script>
    setTimeout(function () { location.reload(); }, 10 * 60 * 1000);
  </script>
</body>
</html>
